spring:
  application:
    name: heroorders
  data:
    redis:
      host: localhost
      port: 6379
      password: heropassword123
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
  cloud:
    aws:
      region:
        static: us-east-1
      endpoint: http://localhost:4566
      credentials:
        access-key: test
        secret-key: test
      sqs:
        enabled: true
        queue:
          auto-create: false
        region: us-east-1

# Logging configuration
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level - %msg%n"
